# Prometheus scrape config for the retail-forecasting API.
global:
  scrape_interval: 15s

scrape_configs:
  # Local API (run `docker compose up api` in the repo root), reached from the
  # Prometheus container via the host gateway.
  - job_name: retail-forecasting-local
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]

  # Live Cloud Run service (HTTPS). Uncomment to scrape the deployed API.
  # - job_name: retail-forecasting-cloudrun
  #   scheme: https
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["retail-forecasting-api-ude5vos6lq-uc.a.run.app"]
