# Local observability stack: Prometheus scrapes the API's /metrics endpoint and
# Grafana visualises it via a pre-provisioned dashboard.
#
#   1. In the repo root:   docker compose up api        # API on :8000
#   2. In this folder:     docker compose -f docker-compose.monitoring.yml up
#   3. Grafana: http://localhost:3000  (anonymous viewer; admin/admin to edit)
#      Prometheus: http://localhost:9090
name: retail-forecasting-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: rf-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: rf-grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
