# ===========================================================================
# Retail Demand Forecasting — central configuration
# All paths are resolved relative to this file unless absolute.
# Override the active file with the RF_CONFIG environment variable.
# ===========================================================================

log_level: INFO

data:
  raw_path: ../data/simulated_retail_dataset.csv
  processed_path: ../data/processed_retail_dataset.csv
  target_column: sales_volume
  timestamp_column: timestamp
  id_column: product_id

generator:
  num_days: 60
  num_products: 100
  seed: 42
  start_date: "2025-01-01"

train:
  test_size: 0.2
  model_dir: ../models
  model_filename: lgbm_model.joblib
  random_state: 42
  lgbm_params:
    objective: regression
    n_estimators: 600
    learning_rate: 0.05
    num_leaves: 64
    max_depth: -1
    subsample: 0.8
    colsample_bytree: 0.8
    n_jobs: -1

mlflow:
  tracking_uri: file:./mlruns
  experiment_name: retail-demand-forecasting
  registered_model_name: retail-lgbm
